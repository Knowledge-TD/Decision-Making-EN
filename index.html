<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>Decision Making Path</title>
<style>
:root{--accent:#0753b6;--accent2:#08756d;}

:root{
  --bg:#f7fbff;
  --panel:#ffffff;
  --text:#0e2442;
  --muted:#5f6f83;
  --line:#d8e3ef;
  --locked:#aeb8c6;
  --shadow:0 14px 32px rgba(16,42,67,.12);
  --soft-shadow:0 8px 22px rgba(16,42,67,.10);
  --focus:#143d73;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family: Calibri, Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 10% 6%, rgba(88,166,255,.14), transparent 28rem),
    radial-gradient(circle at 88% 12%, rgba(41,190,160,.11), transparent 24rem),
    linear-gradient(180deg,#fbfdff 0%,var(--bg) 100%);
  color:var(--text);
  min-height:100vh;
}
button{font-family:inherit}
button:focus-visible{outline:4px solid rgba(20,61,115,.35);outline-offset:4px}
.app{max-width:1040px;margin:0 auto;padding:28px 18px 64px}
.hero{
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-radius:28px;
  box-shadow:var(--soft-shadow);
  padding:26px;
  display:flex;
  gap:18px;
  justify-content:space-between;
  align-items:center;
}
.hero-main{display:flex;gap:16px;align-items:center;min-width:0}
.hero-badge{
  width:62px;height:62px;border-radius:20px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 12px 25px rgba(20,61,115,.18);flex:0 0 auto;
}
.hero h1{margin:0;font-size:34px;line-height:1.06;letter-spacing:-.02em}
.hero p{margin:7px 0 0;color:var(--muted);font-size:17px;line-height:1.45}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.progress-pill,.reset-btn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  border-radius:999px;
  padding:10px 14px;
  font-size:15px;
  box-shadow:0 5px 16px rgba(16,42,67,.07);
}
.reset-btn{cursor:pointer;font-weight:700}
.reset-btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(16,42,67,.11)}
.path-wrap{position:relative;margin:34px auto 0;max-width:760px;padding-bottom:10px}
.path-wrap::before{
  content:"";position:absolute;left:51px;top:48px;bottom:48px;width:8px;border-radius:99px;
  background:linear-gradient(180deg,rgba(20,61,115,.13),rgba(20,61,115,.05));
}
.path-list{position:relative;display:flex;flex-direction:column;margin:0;padding:0;list-style:none}
.path-item{display:grid;grid-template-columns:112px minmax(0,1fr);align-items:start;min-height:118px;position:relative}
.step-shell{grid-column:1;display:flex;justify-content:center;position:relative;z-index:2;padding-top:0}
.step-content{grid-column:2;min-width:0;padding:22px 0 0 10px}
.step-btn{
  width:92px;height:92px;border:0;border-radius:50%;cursor:pointer;position:relative;
  display:grid;place-items:center;color:#fff;background:var(--step-color);
  box-shadow:0 14px 28px rgba(16,42,67,.22), inset 0 -8px 0 rgba(0,0,0,.10);
  transition:transform .22s ease, box-shadow .22s ease, filter .22s ease;
}
.step-btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 18px 34px rgba(16,42,67,.26), inset 0 -8px 0 rgba(0,0,0,.10)}
.step-btn[aria-expanded="true"]{transform:scale(1.04);box-shadow:0 18px 38px rgba(16,42,67,.28),0 0 0 8px rgba(255,255,255,.94)}
.step-btn.locked{cursor:not-allowed;background:linear-gradient(145deg,#c8d0da,#aeb8c6);box-shadow:0 8px 18px rgba(16,42,67,.10), inset 0 -8px 0 rgba(0,0,0,.06);filter:saturate(.45)}
.step-btn.locked:hover{transform:none}
.step-icon{width:38px;height:38px;display:block}
.step-number{
  position:absolute;right:3px;bottom:3px;width:29px;height:29px;border-radius:50%;display:grid;place-items:center;
  background:rgba(255,255,255,.96);color:var(--step-color);font-weight:900;font-size:15px;border:2px solid rgba(255,255,255,.85);
}
.locked .step-number{color:#6d7784}
.node-label{
  display:inline-block;max-width:100%;
  background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-weight:800;font-size:15px;line-height:1.25;
  box-shadow:0 6px 16px rgba(16,42,67,.09);color:var(--text);
  overflow-wrap:anywhere;
}
.locked-label{color:#7a8593;background:#f5f7fa}
.step-card{
  width:min(520px,100%);background:rgba(255,255,255,.98);border:1px solid var(--line);border-top:6px solid var(--step-color);
  border-radius:22px;padding:18px;box-shadow:var(--shadow);transform-origin:left top;margin-top:14px;
  animation:cardIn .23s ease both;
}
@keyframes cardIn{from{opacity:0;transform:scale(.96) translateY(-8px);max-height:0}to{opacity:1;transform:scale(1) translateY(0);max-height:720px}}
.step-card h2{font-size:20px;margin:0 0 8px;line-height:1.18}
.step-card p{margin:0;color:#2c4058;font-size:16px;line-height:1.52}
.tile-area{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
.framework-tile{
  border:1px solid #cbd9e9;
  background:linear-gradient(180deg,#fff,#f7fbff);
  color:var(--text);border-radius:16px;padding:10px 12px;min-height:46px;cursor:pointer;font-weight:800;font-size:14px;
  display:flex;align-items:center;gap:8px;box-shadow:0 5px 15px rgba(16,42,67,.07);transition:transform .18s ease, box-shadow .18s ease;
}
.framework-tile:hover{transform:translateY(-2px);box-shadow:0 10px 18px rgba(16,42,67,.12)}
.tile-mini{width:22px;height:22px;color:var(--step-color);flex:0 0 auto}
.arrow-row{display:grid;grid-template-columns:112px minmax(0,1fr);align-items:center;height:66px;position:relative;z-index:3}
.unlock-btn{
  grid-column:1;justify-self:center;width:44px;height:44px;border-radius:50%;border:2px solid #fff;cursor:pointer;
  background:linear-gradient(180deg,#fff,#edf5ff);color:var(--focus);box-shadow:0 9px 20px rgba(16,42,67,.13);display:grid;place-items:center;
  transition:transform .18s ease, opacity .18s ease, filter .18s ease;
}
.unlock-btn:hover{transform:translateY(2px)}
.unlock-btn:disabled{cursor:not-allowed;opacity:.55;filter:grayscale(1);background:#f0f2f5;color:#798392}
.unlock-btn.done{background:linear-gradient(180deg,#eafff8,#ffffff);color:#10856f}
.unlock-btn svg{width:24px;height:24px}
.detail-view{display:none;max-width:1000px;margin:34px auto 0;background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
.detail-view.active{display:block;animation:detailIn .22s ease both}
@keyframes detailIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail-header{padding:24px 26px;background:linear-gradient(135deg,#f5faff,#fff);border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:center;justify-content:space-between}
.detail-title-wrap{display:flex;gap:15px;align-items:center;min-width:0}
.detail-icon{width:58px;height:58px;border-radius:18px;background:var(--detail-color);display:grid;place-items:center;color:#fff;box-shadow:0 10px 24px rgba(16,42,67,.16);flex:0 0 auto}
.detail-header h2{font-size:30px;margin:0;line-height:1.1}
.detail-header p{font-size:16px;color:var(--muted);line-height:1.45;margin:7px 0 0;max-width:680px}
.back-btn{border:0;background:var(--text);color:#fff;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer;white-space:nowrap;box-shadow:0 8px 18px rgba(16,42,67,.17)}
.back-btn:hover{transform:translateY(-1px)}
.detail-body{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;padding:24px 26px 28px}
.info-card,.visual-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 20px rgba(16,42,67,.06)}
.info-card h3,.visual-card h3{margin:0 0 10px;font-size:19px;line-height:1.2;color:var(--text)}
.info-card p,.info-card li{font-size:16px;line-height:1.52;color:#2c4058}
.info-card p{margin:0 0 12px}.info-card p:last-child{margin-bottom:0}
ul.clean-list,ol.clean-list{margin:0;padding-left:22px}.clean-list li{margin:6px 0}
.visual-stage{min-height:260px;display:grid;place-items:center;padding:8px}
.badge-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}
.bubble{width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:#f6fbff;border:2px solid #c9ddeb;font-weight:900;color:var(--text);box-shadow:0 8px 18px rgba(16,42,67,.08)}
.why-ladder{display:flex;flex-direction:column;gap:9px;width:min(430px,100%)}
.why-card{padding:11px 13px;border-radius:14px;border:1px solid #d9e6f0;background:#f7fbff;font-size:15px;line-height:1.35}
.why-card strong{color:var(--detail-color)}
.fishbone-svg{width:min(560px,100%);height:auto;display:block}
.hats-grid{display:grid;grid-template-columns:repeat(3,minmax(82px,1fr));gap:10px;width:min(420px,100%)}
.hat-card{border-radius:18px;padding:12px 8px;text-align:center;color:#fff;font-weight:900;box-shadow:0 8px 16px rgba(16,42,67,.13);min-height:72px;display:grid;place-items:center}
.mindmap{position:relative;width:min(420px,100%);height:250px}.mind-node{position:absolute;border-radius:999px;padding:10px 14px;background:#fff;border:2px solid var(--detail-color);font-weight:900;box-shadow:0 8px 18px rgba(16,42,67,.10)}.mind-center{left:50%;top:50%;transform:translate(-50%,-50%);background:var(--detail-color);color:#fff}.m1{left:5%;top:18%}.m2{right:5%;top:18%}.m3{left:10%;bottom:18%}.m4{right:8%;bottom:18%}.mind-line{position:absolute;left:50%;top:50%;height:2px;background:#c9ddeb;transform-origin:left center}.l1{width:135px;transform:rotate(214deg)}.l2{width:135px;transform:rotate(326deg)}.l3{width:120px;transform:rotate(146deg)}.l4{width:122px;transform:rotate(35deg)}
.cards-people{display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap}.person{width:52px;height:82px;position:relative}.person:before{content:"";position:absolute;top:0;left:50%;width:30px;height:30px;border-radius:50%;background:#dff3ff;transform:translateX(-50%);border:2px solid var(--detail-color)}.person:after{content:"";position:absolute;bottom:0;left:50%;width:42px;height:48px;border-radius:16px 16px 8px 8px;background:var(--detail-color);transform:translateX(-50%);opacity:.88}.idea-card{width:82px;height:56px;border-radius:12px;background:#fff;border:2px solid var(--detail-color);box-shadow:0 8px 18px rgba(16,42,67,.09);display:grid;place-items:center;font-weight:900;color:var(--detail-color)}
.matrix{width:min(460px,100%);border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:16px;border:1px solid var(--line);font-size:14px}.matrix th,.matrix td{padding:10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:center}.matrix th{background:#f0f7ff;font-weight:900}.matrix tr:last-child td{border-bottom:0}.matrix th:last-child,.matrix td:last-child{border-right:0}
.swot-grid,.sfa-grid,.traps-grid{display:grid;gap:10px;width:min(440px,100%)}.swot-grid{grid-template-columns:repeat(2,1fr)}.sfa-grid{grid-template-columns:repeat(3,1fr)}.traps-grid{grid-template-columns:repeat(2,1fr)}
.mini-box{border-radius:16px;padding:13px;min-height:78px;border:1px solid #d7e6ef;background:#f3fbfa;display:grid;place-items:center;text-align:center;font-weight:900;color:#17314f}
.trap-wrap{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%}.warning-core{width:96px;height:96px;border-radius:24px;background:var(--detail-color);color:#fff;display:grid;place-items:center;font-size:40px;box-shadow:0 10px 24px rgba(16,42,67,.15)}
.bar-visual{display:flex;gap:22px;align-items:flex-end;height:220px}.bar{width:110px;border-radius:18px 18px 8px 8px;display:grid;place-items:end center;color:#fff;font-weight:900;padding-bottom:12px;box-shadow:0 10px 22px rgba(16,42,67,.14)}.bar.benefit{height:182px;background:#168a44}.bar.cost{height:112px;background:#c83232}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}.donut-svg{width:min(280px,100%);height:auto}.donut-legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}.legend-pill{display:flex;align-items:center;gap:7px;font-weight:800;color:#29435b}.legend-dot{width:14px;height:14px;border-radius:50%}.ladder-7{display:flex;flex-direction:column-reverse;gap:7px;width:min(390px,100%)}.ladder-step{padding:8px 10px;border-radius:13px;background:#f4fbff;border:1px solid #d7e6ef;font-weight:800;font-size:13px;color:#18334e;text-align:center}
.path-view.hidden{display:none}
@media (max-width:760px){
  .app{padding:16px 12px 44px}.hero{padding:18px;align-items:flex-start;flex-direction:column}.hero h1{font-size:28px}.hero p{font-size:16px}.hero-badge{width:54px;height:54px;border-radius:18px}.toolbar{width:100%;justify-content:space-between}.progress-pill,.reset-btn{font-size:14px;padding:9px 12px}
  .path-wrap{max-width:100%;margin-top:28px}.path-wrap::before{left:45px;top:44px;bottom:44px}.path-item{grid-template-columns:96px minmax(0,1fr);min-height:108px}.step-btn{width:82px;height:82px}.step-content{padding-top:20px;padding-left:4px}.node-label{font-size:14px;padding:8px 12px}.step-card{border-radius:20px;padding:16px;margin-top:12px}.arrow-row{grid-template-columns:96px minmax(0,1fr);height:64px}.unlock-btn{width:42px;height:42px;justify-self:center}.detail-header{padding:19px;flex-direction:column;align-items:flex-start}.detail-header h2{font-size:25px}.detail-body{grid-template-columns:1fr;padding:18px}.detail-title-wrap{align-items:flex-start}.back-btn{width:100%;text-align:center}.visual-stage{min-height:210px}.hats-grid,.swot-grid,.sfa-grid,.traps-grid{grid-template-columns:1fr}.bubble{width:74px;height:74px}.detail-icon{width:50px;height:50px}.mindmap{height:230px}.mind-node{font-size:13px}.bar{width:90px}.bar-visual{height:190px}.bar.benefit{height:160px}.bar.cost{height:100px}
}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;animation:none!important;transition:none!important}.step-btn:hover,.reset-btn:hover,.framework-tile:hover,.back-btn:hover{transform:none!important}}

</style>

<body>
<main class="app">
  <section id="pathView" class="path-view" aria-label="Decision Making Path">
    <header class="hero">
      <div class="hero-main">

    <div class="detail-body">
      <article id="detailInfo" class="info-card"></article>
      <article id="detailVisual" class="visual-card"></article>
    </div>
  </section>
</main>

oritize actions that create the highest impact.", "Avoid spreading effort equally across issues with unequal value."]}, "decision_matrix": {"title": "Decision Matrix", "icon": "checklist", "color": "#1fb7aa", "explanation": "A Decision Matrix helps evaluate and select the best option when there are multiple alternatives and several criteria.", "visual": "matrix", "paragraphs": ["List the options, list the criteria, score each option against each criterion, and use the results to support a more logical decision."], "list": ["Define the problem.", "List potential solutions.", "Narrow down options.", "List criteria.", "Draw the matrix.", "Evaluate options.", "Refine and repeat."], "ordered": true}, "sfa": {"title": "SFA Matrix", "icon": "weights", "color": "#1fb7aa", "explanation": "SFA Matrix is similar to a Decision Matrix but uses three strategic categories: Suitability, Feasibility, and Acceptability.", "visual": "sfa", "paragraphs": ["Suitability asks whether the opportunity fits the company. Feasibility asks whether the company can realistically do it. Acceptability asks whether it works financially and for stakeholders."], "list": ["Suitability: fit with the company.", "Feasibility: realistic ability to implement.", "Acceptability: financial and stakeholder acceptance."]}, "traps": {"title": "Decision-Making Traps", "icon": "shield", "color": "#139889", "explanation": "Decision traps are thinking or information problems that can lead to poor decisions.", "visual": "traps", "paragraphs": ["Before confirming a decision, check whether the team is relying on weak information, biased views, a very small sample, misleading averages, selected facts, or unclear interpretation."], "list": ["Bias: assuming one biased view represents everyone.", "Misdirection: using inaccurate information or asking the wrong question.", "Sampling: deciding from only a very small sample.", "Averages: being misled by averages when the median or distribution matters.", "Selectivity: using onl <script>

(function(){
'use strict';
const ns = 'http://www.w3.org/2000/svg';
const config = window.PATH_CONFIG;
let unlocked = 1;
let openStep = null;
const memory = { value: 1 };
const pathView = document.getElementById('pathView');
const list = document.getElementById('pathList');
const progress = document.getElementById('progressText');
const resetBtn = document.getElementById('resetBtn');
const detailView = document.getElementById('detailView');
const detailHeader = document.getElementById('detailHeader');
const detailTitle = document.getElementById('detailTitle');
const detailExplain = document.getElementById('detailExplain');
const detailIconBox = document.getElementById('detailIconBox');
const detailInfo = document.getElementById('detailInfo');
const detailVisual = document.getElementById('detailVisual');
const backBtn = document.getElementById('backBtn');

function safeLoad(){
  try{
    const v = Number(localStorage.getItem(config.storageKey));
    if(Number.isInteger(v) && v >= 1 && v <= config.steps.length){ memory.value = v; return v; }
  }catch(e){}
  return memory.value;
}
function safeSave(value){ memory.value = value; try{ localStorage.setItem(config.storageKey, String(value)); }catch(e){} }

function makeEl(tag, className, text){ const el = document.createElement(tag); if(className) el.className = className; if(text !== undefined) el.textContent = text; return el; }
function makeSvg(viewBox){ const svg = document.createElementNS(ns,'svg'); svg.setAttribute('viewBox', viewBox || '0 0 24 24'); svg.setAttribute('aria-hidden','true'); svg.setAttribute('focusable','false'); return svg; }
function addPath(svg,d,w){ const p=document.createElementNS(ns,'path'); p.setAttribute('d',d); p.setAttribute('fill','none'); p.setAttribute('stroke','currentColor'); p.setAttribute('stroke-width',w || '2'); p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round'); svg.appendChild(p); return p; }
function addCircle(svg,cx,cy,r,fill,stroke){ const c=document.createElementNS(ns,'circle'); c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r); if(fill){ c.setAttribute('fill',fill); } else { c.setAttribute('fill','none'); } if(stroke !== false){ c.setAttribute('stroke','currentColor'); c.setAttribute('stroke-width','2'); } svg.appendChild(c); return c; }
function addRect(svg,x,y,w,h,rx,fill,stroke){ const r=document.createElementNS(ns,'rect'); r.setAttribute('x',x); r.setAttribute('y',y); r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('rx',rx||2); r.setAttribute('fill',fill || 'none'); if(stroke !== false){ r.setAttribute('stroke','currentColor'); r.setAttribute('stroke-width','2'); } svg.appendChild(r); return r; }
function addTextSvg(svg,x,y,text,size,color){ const t=document.createElementNS(ns,'text'); t.setAttribute('x',x); t.setAttribute('y',y); t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle'); t.setAttribute('font-size',size||'14'); t.setAttribute('font-family','Calibri, Arial, sans-serif'); t.setAttribute('font-weight','900'); t.setAttribute('fill',color || 'currentColor'); t.textContent=text; svg.appendChild(t); return t; }

function icon(name){
  const svg = makeSvg(); svg.classList.add('step-icon');
  switch(name){
    case 'team': addCircle(svg,12,7,3,null,true); addCircle(svg,6,10,2.4,null,true); addCircle(svg,18,10,2.4,null,true); addPath(svg,'M6 20c0-3.2 2.5-5 6-5s6 1.8 6 5'); addPath(svg,'M2.7 19c.3-2.4 2-3.8 4.3-4'); addPath(svg,'M21.3 19c-.3-2.4-2-3.8-4.3-4'); break;
    case 'document': addPath(svg,'M7 3h7l4 4v14H7z'); addPath(svg,'M14 3v5h4'); addPath(svg,'M9.5 12h5M9.5 16h3.5'); addCircle(svg,17.5,17.5,2.5,null,true); addPath(svg,'M19.5 19.5l1.6 1.6'); break;
    case 'shield': addPath(svg,'M12 3l8 3v6c0 5-3.4 8-8 9-4.6-1-8-4-8-9V6z'); addPath(svg,'M8.5 12.5l2.2 2.2 4.8-5.4'); break;
    case 'search': addCircle(svg,10.5,10.5,6,null,true); addPath(svg,'M15 15l5 5'); addTextSvg(svg,10.5,10.5,'?',8); break;
    case 'idea': addPath(svg,'M12 3a6 6 0 00-3.5 10.8c1.3.9 1.5 2 1.5 3.2h4c0-1.2.2-2.3 1.5-3.2A6 6 0 0012 3z'); addPath(svg,'M10 20h4M10 17h4'); addPath(svg,'M17.5 8.5l1.5 1.5 3-3'); break;
    case 'wrench': addPath(svg,'M21 6.5a5 5 0 01-6.6 6.6L7 20.5a2.1 2.1 0 01-3-3l7.4-7.4A5 5 0 0118 3.5l-3 3 3 3z'); break;
    case 'prevent': addPath(svg,'M6 8a7 7 0 0111-2l1 1'); addPath(svg,'M18 3v4h-4'); addPath(svg,'M18 16a7 7 0 01-11 2l-1-1'); addPath(svg,'M6 21v-4h4'); addPath(svg,'M9 12l2 2 4-5'); break;
    case 'trophy': addPath(svg,'M8 4h8v5a4 4 0 01-8 0z'); addPath(svg,'M8 6H4c0 3 1.5 5 4 5M16 6h4c0 3-1.5 5-4 5M12 13v4M9 21h6M8 17h8'); break;
    case 'target': addCircle(svg,12,12,8,null,true); addCircle(svg,12,12,4,null,true); addCircle(svg,12,12,1.4,'currentColor',false); addPath(svg,'M15 5l4-3M17 7l4-3M17 7h-4V3'); break;
    case 'checklist': addRect(svg,5,3,14,18,2,null,true); addPath(svg,'M8 8l1 1 2-2M8 13l1 1 2-2M8 18l1 1 2-2M13 8h3M13 13h3M13 18h3'); break;
    case 'weights': addPath(svg,'M12 4v17'); addPath(svg,'M9 21h6'); addPath(svg,'M4 7h16'); addPath(svg,'M4 7l-2.5 6h5z'); addPath(svg,'M20 7l-2.5 6h5z'); addCircle(svg,12,3.2,1.2,'currentColor',false); break;
    case 'alternatives': addCircle(svg,7,9,3.2,null,true); addCircle(svg,17,9,3.2,null,true); addCircle(svg,12,17,3.2,null,true); break;
    case 'evaluate': addPath(svg,'M4 20h16'); addRect(svg,6,12,3,6,1,'currentColor',false); addRect(svg,11,8,3,10,1,'currentColor',false); addRect(svg,16,5,3,13,1,'currentColor',false); addCircle(svg,17,17,3,null,true); addPath(svg,'M19.5 19.5l2 2'); break;
    case 'select': addCircle(svg,12,12,8,null,true); addPath(svg,'M8.5 12.5l2.3 2.3 5-5.6'); addPath(svg,'M12 2v3M12 19v3'); break;
    case 'implement': addCircle(svg,12,12,3,null,true); addPath(svg,'M12 2v3M12 19v3M4.9 4.9L7 7M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1L7 17M17 7l2.1-2.1'); break;
    case 'plus': addRect(svg,4,4,16,16,4,null,true); addPath(svg,'M8 12h8M12 8v8'); break;
    default: addCircle(svg,12,12,8,null,true); addTextSvg(svg,12,12,'?',8);
  }
  return svg;
}
function smallIcon(){ const svg = icon('plus'); svg.classList.remove('step-icon'); svg.classList.add('tile-mini'); return svg; }
function arrowIcon(done){ const svg=makeSvg(); if(done){ addPath(svg,'M5 12l4 4L19 6','2.7'); } else { addPath(svg,'M12 5v13'); addPath(svg,'M6 12l6 6 6-6'); } return svg; }
function updateProgress(){ progress.textContent = `Progress: ${unlocked} / ${config.steps.length} steps unlocked`; }
function render(){
  list.textContent = '';
  config.steps.forEach((step, idx)=>{
    const index = idx + 1;
    const li = makeEl('li','path-item');
    const shell = makeEl('div','step-shell');
    const btn = makeEl('button','step-btn');
    btn.type='button';
    btn.style.setProperty('--step-color', step.color);
    btn.setAttribute('aria-label', `${step.title}${index > unlocked ? ' locked' : ''}`);
    btn.setAttribute('aria-expanded', openStep === index ? 'true':'false');
    if(index > unlocked){ btn.classList.add('locked'); btn.disabled = true; }
    btn.appendChild(icon(step.icon));
    btn.appendChild(makeEl('span','step-number',String(index).padStart(2,'0')));
    btn.addEventListener('click',()=>{ if(index <= unlocked){ openStep = openStep === index ? null : index; render(); } });
    shell.appendChild(btn);
    const content = makeEl('div','step-content');
    const label = makeEl('span','node-label',step.title);
    if(index > unlocked) label.classList.add('locked-label');
    content.appendChild(label);
    if(openStep === index){ content.appendChild(makeStepCard(step,index)); }
    li.append(shell, content);
    list.appendChild(li);
    if(index < config.steps.length){ list.appendChild(makeArrow(index)); }
  });
  updateProgress();
}
function makeStepCard(step,index){
  const card = makeEl('article','step-card'); card.style.setProperty('--step-color',step.color);
  card.appendChild(makeEl('h2',null,`${String(index).padStart(2,'0')} · ${step.title}`));
  step.summary.forEach(t=>card.appendChild(makeEl('p',null,t)));
  if(step.frameworks && step.frameworks.length){
    const tiles = makeEl('div','tile-area');
    step.frameworks.forEach(fid=>{
      const fw = config.frameworks[fid];
      if(!fw) return;
      const b = makeEl('button','framework-tile'); b.type='button'; b.style.setProperty('--step-color',step.color); b.appendChild(smallIcon()); b.appendChild(document.createTextNode(fw.title));
      b.addEventListener('click',()=>showFramework(fid,step.color));
      tiles.appendChild(b);
    });
    card.appendChild(tiles);
  }
  return card;
}
function makeArrow(index){
  const row = makeEl('li','arrow-row');
  const b = makeEl('button','unlock-btn'); b.type='button';
  const next=index+1; const done=unlocked>=next;
  if(done) b.classList.add('done');
  b.disabled = index > unlocked;
  b.setAttribute('aria-label',done ? `Step ${next} unlocked`:`Unlock step ${next}`);
  b.appendChild(arrowIcon(done));
  b.addEventListener('click',()=>{ if(index <= unlocked && unlocked < next){ unlocked=next; safeSave(unlocked); openStep=next; render(); setTimeout(()=>{ const buttons=list.querySelectorAll('.step-btn'); if(buttons[index]) buttons[index].scrollIntoView({block:'center',behavior:'smooth'}); },30); } });
  row.appendChild(b); return row;
}
function showFramework(id,fallbackColor){
  const fw=config.frameworks[id]; if(!fw) return;
  pathView.classList.add('hidden'); detailView.classList.add('active');
  const color=fw.color || fallbackColor || config.accent;
  detailHeader.style.setProperty('--detail-color',color); detailView.style.setProperty('--detail-color',color);
  detailTitle.textContent=fw.title; detailExplain.textContent=fw.explanation;
  detailIconBox.textContent=''; detailIconBox.appendChild(icon(fw.icon || 'target'));
  detailInfo.textContent=''; detailInfo.appendChild(makeEl('h3',null,fw.infoTitle || 'How it works'));
  if(fw.paragraphs){ fw.paragraphs.forEach(p=>detailInfo.appendChild(makeEl('p',null,p))); }
  if(fw.list){ const listEl=makeEl(fw.ordered ? 'ol':'ul','clean-list'); fw.list.forEach(item=>listEl.appendChild(makeEl('li',null,item))); detailInfo.appendChild(listEl); }
  if(fw.example){ const exTitle=makeEl('h3',null,fw.exampleTitle || 'Example'); exTitle.style.marginTop='16px'; detailInfo.appendChild(exTitle); detailInfo.appendChild(makeEl('p',null,fw.example)); }
  detailVisual.textContent=''; detailVisual.appendChild(makeEl('h3',null,fw.visualTitle || 'Visual'));
  const stage=makeEl('div','visual-stage'); buildVisual(stage,fw.visual,color); detailVisual.appendChild(stage);
  detailView.scrollIntoView({block:'start',behavior:'smooth'});
}
function buildVisual(stage,type,color){
  stage.style.setProperty('--detail-color',color);
  switch(type){
    case '5ws': { const row=makeEl('div','badge-row'); ['Who','What','When','Where','Why'].forEach(x=>row.appendChild(makeEl('div','bubble',x))); stage.appendChild(row); break; }
    case '5whys': { const ladder=makeEl('div','why-ladder'); ['Why did this happen?','Why did that happen?','Why did the previous cause happen?','Why was it not prevented?','Why does the system allow this?'].forEach((x,i)=>{ const card=makeEl('div','why-card'); card.appendChild(makeEl('strong',null,`Why ${i+1}: `)); card.appendChild(document.createTextNode(x)); ladder.appendChild(card); }); stage.appendChild(ladder); break; }
    case 'fishbone': stage.appendChild(fishboneSvg(color)); break;
    case 'bulb': { const svg=makeSvg('0 0 240 180'); svg.style.width='min(360px,100%)'; svg.style.height='auto'; addPath(svg,'M120 30a42 42 0 00-25 76c8 6 10 12 10 20h30c0-8 2-14 10-20a42 42 0 00-25-76z','5'); addPath(svg,'M105 138h30M109 154h22','5'); ['No judgment','Quantity','Unusual','Combine'].forEach((t,i)=>{ const x=[46,194,58,184][i], y=[36,46,136,130][i]; addCircle(svg,x,y,28,null,true); addTextSvg(svg,x,y,t,9); }); stage.appendChild(svg); break; }
    case 'brainwriting': { const box=makeEl('div','cards-people'); box.appendChild(makeEl('div','person')); box.appendChild(makeEl('div','idea-card','3 ideas')); box.appendChild(makeEl('div','person')); box.appendChild(makeEl('div','idea-card','5 min')); box.appendChild(makeEl('div','person')); stage.appendChild(box); break; }
    case 'mindmap': { const m=makeEl('div','mindmap'); ['l1','l2','l3','l4'].forEach(c=>m.appendChild(makeEl('div','mind-line '+c))); m.appendChild(makeEl('div','mind-node mind-center','Topic')); m.appendChild(makeEl('div','mind-node m1','Cause')); m.appendChild(makeEl('div','mind-node m2','Idea')); m.appendChild(makeEl('div','mind-node m3','Risk')); m.appendChild(makeEl('div','mind-node m4','Action')); stage.appendChild(m); break; }
    case 'hats': { const grid=makeEl('div','hats-grid'); [['Blue','#1565c0'],['White','#6f7d8d'],['Red','#c62828'],['Black','#222'],['Yellow','#d49a00'],['Green','#178a45']].forEach(([t,c])=>{ const d=makeEl('div','hat-card',t); d.style.background=c; grid.appendChild(d); }); stage.appendChild(grid); break; }
    case 'swot': { const g=makeEl('div','swot-grid'); ['Strengths','Weaknesses','Opportunities','Threats'].forEach(t=>g.appendChild(makeEl('div','mini-box',t))); stage.appendChild(g); break; }
    case 'marginal': { const v=makeEl('div','bar-visual'); v.appendChild(makeEl('div','bar benefit','Benefit')); v.appendChild(makeEl('div','bar cost','Cost')); stage.appendChild(v); break; }
    case 'pareto': stage.appendChild(paretoDonut()); break;
    case 'matrix': { const table=makeEl('table','matrix'); [['Option','Criterion 1','Criterion 2','Criterion 3'],['Option A','3','4','5'],['Option B','5','3','3'],['Option C','4','5','4']].forEach((r,i)=>{ const tr=makeEl('tr'); r.forEach(c=>tr.appendChild(makeEl(i===0?'th':'td',null,c))); table.appendChild(tr); }); stage.appendChild(table); break; }
    case 'sfa': { const g=makeEl('div','sfa-grid'); ['Suitability','Feasibility','Acceptability'].forEach(t=>g.appendChild(makeEl('div','mini-box',t))); stage.appendChild(g); break; }
    case 'traps': { const wrap=makeEl('div','trap-wrap'); wrap.appendChild(makeEl('div','warning-core','!')); const grid=makeEl('div','traps-grid'); ['Bias','Misdirection','Sampling','Averages','Selectivity','Interpretation'].forEach(t=>grid.appendChild(makeEl('div','mini-box',t))); wrap.appendChild(grid); stage.appendChild(wrap); break; }
    default: { const row=makeEl('div','badge-row'); ['Understand','Compare','Choose'].forEach(t=>row.appendChild(makeEl('div','bubble',t))); stage.appendChild(row); }
  }
}
function paretoDonut(){
  const wrap=makeEl('div','donut-wrap');
  const svg=makeSvg('0 0 240 240'); svg.classList.add('donut-svg');
  const bg=document.createElementNS(ns,'circle'); bg.setAttribute('cx','120'); bg.setAttribute('cy','120'); bg.setAttribute('r','72'); bg.setAttribute('fill','none'); bg.setAttribute('stroke','#e8eff7'); bg.setAttribute('stroke-width','34'); svg.appendChild(bg);
  const effect=document.createElementNS(ns,'circle'); effect.setAttribute('cx','120'); effect.setAttribute('cy','120'); effect.setAttribute('r','72'); effect.setAttribute('fill','none'); effect.setAttribute('stroke','#1d72d2'); effect.setAttribute('stroke-width','34'); effect.setAttribute('stroke-linecap','round'); effect.setAttribute('stroke-dasharray','362 452'); effect.setAttribute('transform','rotate(-90 120 120)'); svg.appendChild(effect);
  const causes=document.createElementNS(ns,'circle'); causes.setAttribute('cx','120'); causes.setAttribute('cy','120'); causes.setAttribute('r','72'); causes.setAttribute('fill','none'); causes.setAttribute('stroke','#76c7ff'); causes.setAttribute('stroke-width','34'); causes.setAttribute('stroke-linecap','round'); causes.setAttribute('stroke-dasharray','90 452'); causes.setAttribute('stroke-dashoffset','-362'); causes.setAttribute('transform','rotate(-90 120 120)'); svg.appendChild(causes);
  addTextSvg(svg,120,108,'80%',28,'#0e2442'); addTextSvg(svg,120,136,'Effect',16,'#5f6f83');
  wrap.appendChild(svg);
  const legend=makeEl('div','donut-legend');
  [['#1d72d2','80% Effect'],['#76c7ff','20% Causes']].forEach(([color,text])=>{ const pill=makeEl('div','legend-pill'); const dot=makeEl('span','legend-dot'); dot.style.background=color; pill.append(dot,document.createTextNode(text)); legend.appendChild(pill); });
  wrap.appendChild(legend); return wrap;
}
function fishboneSvg(color){
  const svg=makeSvg('0 0 760 390'); svg.classList.add('fishbone-svg'); svg.style.color=color;
  addPath(svg,'M70 195h510l90-70v140l-90-70','6');
  const top=[['Machine',180,72,150,185],['Materials',330,72,300,185],['Methods',480,72,450,185]];
  const bottom=[['Personnel',180,318,150,205],['Measurements',330,318,300,205],['Environment',480,318,450,205]];
  top.concat(bottom).forEach(([t,x,y,x2,y2])=>{ addPath(svg,`M${x2} ${y2}L${x} ${y}`,'5'); addTextSvg(svg,x,y,t,22,color); });
  addTextSvg(svg,625,195,'Problem',24,color);
  return svg;
}
backBtn.addEventListener('click',()=>{ detailView.classList.remove('active'); pathView.classList.remove('hidden'); window.scrollTo({top:0,behavior:'smooth'}); });
resetBtn.addEventListener('click',()=>{ if(confirm('Are you sure you want to reset your progress and start again?')){ clearStore(); unlocked=1; openStep=1; detailView.classList.remove('active'); pathView.classList.remove('hidden'); render(); } });
unlocked=safeLoad(); openStep=Math.min(unlocked,1); render();
})();

</script>
